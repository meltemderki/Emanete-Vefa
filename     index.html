<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emanete Vefa v1.0</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f7f4ee;color:#2f3b2f;max-width:520px;margin:auto;padding:20px}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h1{margin:0 0 8px}
.item{display:flex;align-items:center;padding:8px 0}
.item input{width:22px;height:22px;margin-right:10px}
progress{width:100%;height:18px}
button{padding:8px 12px;border-radius:10px;border:none;background:#6b8e5b;color:#fff}
</style>
</head>
<body>
<div class="card">
<h1>🌿 Emanete Vefa</h1>
<p>Başlangıç Haftası</p>
<div class="item"><input type="checkbox" class="c">🫚 Zencefil</div>
<div class="item"><input type="checkbox" class="c">🚶 Sabah yürüyüşü (06.30-07.30)</div>
<div class="item"><input type="checkbox" class="c">🥣 Yoğurt kasesi (11.00)</div>
<div class="item"><input type="checkbox" class="c">📖 Hafızlık</div>
<div class="item"><input type="checkbox" class="c">🍽️ Karbonhidratsız akşam yemeği (19.00)</div>
<div class="item"><input type="checkbox" class="c">🚶 Akşam yürüyüşü (20.30-21.30)</div>
<div class="item"><input type="checkbox" class="c">💧 8 bardak su hedefi</div>
<p>İlerleme</p>
<progress id="p" value="0" max="100"></progress>
<p id="t">%0</p>
<button onclick="resetAll()">Günü Sıfırla</button>
</div>
<script>
const c=[...document.querySelectorAll('.c')];
const p=document.getElementById('p');
const t=document.getElementById('t');
function update(){
 let done=c.filter(x=>x.checked).length;
 let v=Math.round(done/c.length*100);
 p.value=v;t.textContent="%"+v;
 localStorage.setItem("emanetevefa",JSON.stringify(c.map(x=>x.checked)));
}
function resetAll(){c.forEach(x=>x.checked=false);update();}
let s=JSON.parse(localStorage.getItem("emanetevefa")||"[]");
c.forEach((x,i)=>{x.checked=!!s[i];x.onchange=update;});
update();
</script>
</body>
</html>
